name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: cookfinder-${{ github.sha }}.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Setup doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Ensure droplet is running
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
        run: |
          set -euo pipefail

          if [ -z "$DO_HOST" ]; then
            echo "DO_HOST secret is required"
            exit 1
          fi

          DROPLET_ID="$(doctl compute droplet list --format ID,PublicIPv4 --no-header | awk -v host="$DO_HOST" '$2 == host { print $1; exit }')"
          if [ -z "$DROPLET_ID" ]; then
            echo "No droplet found with public IP: $DO_HOST"
            exit 1
          fi

          STATUS="$(doctl compute droplet get "$DROPLET_ID" --format Status --no-header | tr -d '[:space:]')"
          if [ "$STATUS" = "off" ]; then
            echo "Droplet $DROPLET_ID is off. Powering on..."
            doctl compute droplet-action power-on "$DROPLET_ID"
          else
            echo "Droplet $DROPLET_ID status is $STATUS"
          fi

          for i in $(seq 1 30); do
            STATUS="$(doctl compute droplet get "$DROPLET_ID" --format Status --no-header | tr -d '[:space:]')"
            if [ "$STATUS" = "active" ]; then
              echo "Droplet is active"
              exit 0
            fi

            echo "Waiting for droplet to become active (current: $STATUS)"
            sleep 10
          done

          echo "Timed out waiting for droplet to become active"
          exit 1

      - name: Restore
        run: dotnet restore src/CookFinder.Bot/CookFinder.Bot.csproj

      - name: Build
        run: dotnet build src/CookFinder.Bot/CookFinder.Bot.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish src/CookFinder.Bot/CookFinder.Bot.csproj -c Release -o out --no-build

      - name: Stamp build metadata
        run: |
          printf '%s' "${GITHUB_SHA}" > out/.build_commit

      - name: Package
        run: tar -czf "${PACKAGE_NAME}" -C out .

      - name: Upload package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          source: ${{ env.PACKAGE_NAME }}
          target: /tmp

      - name: Deploy on Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          port: ${{ secrets.DO_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.DO_APP_DIR }}"
            SERVICE_NAME="${{ secrets.DO_SERVICE_NAME }}"
            PACKAGE_PATH="/tmp/${{ env.PACKAGE_NAME }}"
            EXPECTED_COMMIT="${{ github.sha }}"

            if [ -z "$APP_DIR" ]; then
              echo "DO_APP_DIR secret is required"
              exit 1
            fi

            if [ -z "$SERVICE_NAME" ]; then
              echo "DO_SERVICE_NAME secret is required"
              exit 1
            fi

            if [ ! -f "$PACKAGE_PATH" ]; then
              echo "Package not found: $PACKAGE_PATH"
              exit 1
            fi

            mkdir -p "$APP_DIR"
            find "$APP_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            tar -xzf "$PACKAGE_PATH" -C "$APP_DIR"

            if [ ! -f "$APP_DIR/.build_commit" ]; then
              echo "Missing build stamp after extraction"
              exit 1
            fi

            ACTUAL_COMMIT="$(cat "$APP_DIR/.build_commit")"
            if [ "$ACTUAL_COMMIT" != "$EXPECTED_COMMIT" ]; then
              echo "Build stamp mismatch. Expected $EXPECTED_COMMIT got $ACTUAL_COMMIT"
              exit 1
            fi

            sudo systemctl restart "$SERVICE_NAME"
            sudo systemctl is-active --quiet "$SERVICE_NAME"

            echo "Deployment successful: $SERVICE_NAME now running commit $ACTUAL_COMMIT"
            rm -f "$PACKAGE_PATH"
